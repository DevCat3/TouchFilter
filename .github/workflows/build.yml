name: Build TouchFilter Magisk Module

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Compile touch_filter (arm64-v8a static)
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang \
            -O2 \
            -static-pie \
            -o system/bin/touch_filter \
            jni/touch_filter.c
          file system/bin/touch_filter

      - name: Package Magisk zip
        run: |
          zip -r TouchFilter.zip \
            META-INF/ \
            system/ \
            module.prop \
            service.sh

      - name: Upload Magisk module
        uses: actions/upload-artifact@v4
        with:
          name: TouchFilter-magisk
          path: TouchFilter.zip
          retention-days: 30
